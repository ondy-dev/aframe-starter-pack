<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sky Test</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>
<body>
  <a-scene>
    <a-assets>
      <img id="sky-tex" src="space_background.png">
    </a-assets>

    <a-sky src="#sky-tex"></a-sky>
  </a-scene>

  <script>
    const img = document.getElementById('sky-tex');
    img.addEventListener('load', () => console.log('loaded'));
    img.addEventListener('error', () => console.log('failed'));
  </script>
</body>
</html>

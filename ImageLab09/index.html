<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
    <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene>
    <a-assets>
      <img id="snowTexture" src="snow.jpg">
    </a-assets>

    <!-- Snowman -->
    <a-entity position="0 0 0">
      <a-sphere 
        position="0 0.8 -5" radius="0.8"
        src="#snowTexture"
        material="roughness: 1">
      </a-sphere>

      <a-sphere 
        position="0 1.9 -5" radius="0.55"
        src="#snowTexture"
        material="roughness: 1">
      </a-sphere>

      <a-sphere 
        position="0 2.7 -5" radius="0.4"
        src="#snowTexture"
        material="roughness: 1">
      </a-sphere>

      <!-- Eyes -->
      <a-sphere position="-0.12 2.8 -4.65" radius="0.03" color="#111111"></a-sphere>
      <a-sphere position="0.12 2.8 -4.65" radius="0.03" color="#111111"></a-sphere>

      <!-- Nose -->
      <a-cone
        position="0 2.68 -4.6"
        radius-bottom="0.10"
        radius-top="0.01"
        height="0.5"
        rotation="90 0 0"
        color="#ff7f32">
      
        <!-- Tophat-->

      </a-cone>
    </a-entity>
      <!-- the enviroment entity includes a sky. Choose from the presets"none, default, contact, egypt, checkerboard, forest, goaland, yavapai, goldmine, threetowers, poison, arches, tron, japan, dream, volcano, starry, osiris, moon" -->
      <a-entity 
        environment="
          preset: starry;
          skyType: atmosphere;
          skyColor: #dfefff;
          horizonColor: #f5f9ff;
          fog: 0.6;
          ground: hills;
          groundColor: #f7fbff;
          groundColor2: #dfe8ee;
          groundTexture: walkernoise;
          dressing: none;
          grid: none;
          flatShading: false;
        ">
      </a-entity>
    </a-scene>
  </body>
</html>
